apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "microservices-app.customLabels" . | nindent 4 }}
    app.kubernetes.io/component: database-config
data:
  # Resources DB
  RESOURCES_DB_HOST: resources-db
  RESOURCES_DB_PORT: "5432"
  RESOURCES_DB_NAME: {{ .Values.database.resourcesDb.name }}
  RESOURCES_DB_DRIVER: org.postgresql.Driver

  # Songs DB
  SONGS_DB_HOST: songs-db
  SONGS_DB_PORT: "5432"
  SONGS_DB_NAME: {{ .Values.database.songsDb.name }}
  SONGS_DB_DRIVER: org.postgresql.Driver

  # Connection Pool Settings
  DB_POOL_MAX_SIZE: "10"
  DB_POOL_MIN_IDLE: "2"
  DB_CONNECTION_TIMEOUT: "30000"

