apiVersion: v1
kind: Service
metadata:
  name: resource-svc
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: resource-pod
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: song-svc
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: song-pod
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30081
---
apiVersion: v1
kind: Service
metadata:
  name: songs-db
  namespace: k8s-program
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: songs-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: resources-db
  namespace: k8s-program
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: resources-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
      name: postgres
