apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-deployment
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-pod
  template:
    metadata:
      labels:
        app: resource-pod
    spec:
      containers:
        - name: resource-service
          image: resource-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: song-deployment
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: song-pod
  template:
    metadata:
      labels:
        app: song-pod
    spec:
      containers:
        - name: song-service
          image: song-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT
              value: "-1"
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_TEMP_USE_JDBC_METADATA_DEFAULTS
              value: "false"
            - name: SPRING_DATASOURCE_CONTINUE_ON_ERROR
              value: "true"
          volumeMounts:
            - name: song-storage
              mountPath: /app/data
      volumes:
        - name: song-storage
          persistentVolumeClaim:
            claimName: song-pvc